<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>

    <style>
        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 🔥 BACKGROUND IMAGE */
        .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .bg img {
            width: 100%;
            height: 100%;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding-top: 100px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }

        .content {
            margin-top: 40px;
            font-size: 18px;
        }

        .type {
            margin-top: 20px;
            font-size: 22px;
            color: red;
        }

        .qr {
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- 🔥 BACKGROUND (QUAN TRỌNG NHẤT) -->
<div class="bg">
    <img src="images/bg-a.png"/>
</div>

<div class="container">

    <div class="title">LOVE CERTIFICATE ❤️</div>

    <div class="content">
        <p th:text="'Couple: ' + ${maleName} + ' ❤️ ' + ${femaleName}"></p>
        <p th:text="'Duration: ' + ${days} + ' days'"></p>
    </div>

    <div class="type">
        <p th:text="'Rank: ' + ${type}"></p>
    </div>

    <div th:if="${loveStory}">
        <div style="page-break-before: always;"></div>

        <h2 style="text-align: center;">💖 Our Love Story</h2>

        <p th:text="${loveStory}"></p>
    </div>

    <!-- 🔥 QR -->
    <div class="qr">
        <p th:text="'QR length: ' + ${qr != null ? #strings.length(qr) : 'null'}"></p>

        <img th:if="${qr != null}"
             th:src="'data:image/png;base64,' + ${qr}"
             width="120"/>
    </div>

</div>

</body>
</html>
